server:
  port: 8773

spring:
  application:
    name: nuvimi-nutrition-service
  cache:
    cache-names: nutritionSearch

# USDA FoodData Central setup:
#   Works out of the box using the public DEMO_KEY (limited to 30 requests/hour).
#   For real use, get a free key (1,000 requests/hour) at:
#     https://fdc.nal.usda.gov/api-key-signup
#   then export it before starting this service:
#     export USDA_API_KEY=your-real-key-here
nuvimi:
  usda:
    api-key: ${USDA_API_KEY:DEMO_KEY}
    base-url: https://api.nal.usda.gov/fdc/v1

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8771/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.nuvimi.nutrition: INFO
