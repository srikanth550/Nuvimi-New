server:
  port: 8772

spring:
  application:
    name: nuvimi-gateway
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: false
          routes:
            - id: nuvimi-food-recognition-service
              uri: lb://NUVIMI-FOOD-RECOGNITION-SERVICE
              predicates:
                - Path=/api/recognition/**
            - id: nuvimi-nutrition-service
              uri: lb://NUVIMI-NUTRITION-SERVICE
              predicates:
                - Path=/api/nutrition/**
          httpclient:
            connect-timeout: 5000
            response-timeout: 20s

# Origins allowed to call the gateway (Angular dev server + override for production)
nuvimi:
  cors:
    allowed-origins:
      - http://localhost:4200

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8771/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: INFO
