server:
  port: 8081

spring:
  application:
    name: nuvimi-food-recognition-service
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# Google Cloud Vision setup:
#   1. Create/select a project at https://console.cloud.google.com
#   2. Enable the "Cloud Vision API" for that project
#   3. Create an API key under APIs & Services > Credentials
#   4. Export it as an environment variable before starting this service:
#        export GOOGLE_VISION_API_KEY=your-real-key-here
# Until a real key is set, the /api/recognition/image endpoint returns a clear
# 503 explaining how to configure it - searching by name still works fine.
nuvimi:
  vision:
    api-key: ${GOOGLE_VISION_API_KEY:changeme}
    endpoint: https://vision.googleapis.com/v1/images:annotate

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.nuvimi.foodrecognition: INFO
